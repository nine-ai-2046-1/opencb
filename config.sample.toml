# 🤖 OpenCB config sample. Fill secrets locally and DO NOT commit real tokens.
# Place this file at ~/.config/opencb/<profile>/config.toml

bot_token = "YOUR_BOT_TOKEN_HERE"
channel_ids = ["*"]  # serve mode: ["*"] = any channel, or specific IDs: ["123", "456"]
cli_only = true  # true: only /commands, false: all messages
# debug = false
# owner_id = []
# scheduled_admin_bind = "127.0.0.1:19001"

# ── Target CLIs ──
[target.opencode]
cmd = "opencode"
argv = ["run", "#INPUT#"]
# work_dir = "/tmp"
