# 🤖 OpenCB config sample. Fill secrets locally and DO NOT commit real tokens.
debug = false

# ── Profiles ──
[profiles.default]
profile_id = "default"
channel_type = "discord"
channel_ids = ["*"]  # or specific IDs: ["123", "456"]
bot_token = "YOUR_BOT_TOKEN_HERE"

[profiles.default.targets.opencode]
cmd = "opencode"
argv = ["run", "#INPUT#"]
